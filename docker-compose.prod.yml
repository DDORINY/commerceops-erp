name: commerceops

services:
  mysql:
    image: mysql:8.0
    container_name: commerceops-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: commerceops
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=192M
      - --max-connections=50
      - --performance-schema=OFF

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

    mem_limit: 640m

    networks:
      - commerceops-network


  backend:
    image: commerceops-backend:test
    container_name: commerceops-backend
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080

      DB_URL: jdbc:mysql://mysql:3306/commerceops?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MS: 3600000
      JWT_REFRESH_EXPIRATION_MS: 1209600000

      COMMERCEOPS_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COMMERCEOPS_MEDIA_UPLOAD_DIR: /app/uploads
      COMMERCEOPS_MEDIA_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}

      JAVA_TOOL_OPTIONS: >-
        -Xms128m
        -Xmx512m
        -XX:MaxMetaspaceSize=192m
        -XX:+UseSerialGC
        -Dfile.encoding=UTF-8
        -Duser.timezone=Asia/Seoul

    volumes:
      - uploads-data:/app/uploads

    expose:
      - "8080"

    depends_on:
      mysql:
        condition: service_healthy

    mem_limit: 700m

    networks:
      - commerceops-network


  frontend:
    image: commerceops-frontend:test
    container_name: commerceops-frontend
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_OPTIONS: --max-old-space-size=256

    expose:
      - "3000"

    depends_on:
      - backend

    mem_limit: 320m

    networks:
      - commerceops-network


  nginx:
    image: nginx:stable-alpine
    container_name: commerceops-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - frontend
      - backend

    mem_limit: 96m

    networks:
      - commerceops-network


volumes:
  mysql-data:
    name: commerceops-mysql-data

  uploads-data:
    name: commerceops-uploads-data


networks:
  commerceops-network:
    name: commerceops-network
    driver: bridge
