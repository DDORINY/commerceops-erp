spring:
  profiles:
    active: local
  application:
    name: commerceops-erp

  jpa:
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

app:
  initializer:
    enabled: ${APP_INITIALIZER_ENABLED:false}
    admin-email: ${INITIAL_ADMIN_EMAIL:}
    admin-password: ${INITIAL_ADMIN_PASSWORD:}
  product-html-migration:
    mode: ${PRODUCT_HTML_MIGRATION_MODE:}

server:
  servlet:
    encoding:
      charset: UTF-8
      force: true

commerceops:
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
    api-url: ${TOSS_API_URL:https://api.tosspayments.com}
  cors:
    allowed-origins: ${COMMERCEOPS_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  media:
    upload-dir: ${COMMERCEOPS_MEDIA_UPLOAD_DIR:uploads}
    public-base-url: ${COMMERCEOPS_MEDIA_PUBLIC_BASE_URL:http://localhost:8080}
    public-path: /uploads
    max-file-size: 5242880
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - webp
      - gif
